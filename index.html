<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chakri Job Finding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#223B5A",
            accent: "#FF8A4C",
            accentSoft: "#FFB082",
            mint: "#8DD07D",
            surface: "#FFFDF9",
            line: "#E8EEF5",
            muted: "#96A0AF"
          },
          boxShadow: {
            soft: "0 20px 60px rgba(34, 59, 90, 0.08)",
            card: "0 18px 50px rgba(34, 59, 90, 0.10)"
          },
          fontFamily: {
            sans: ["Arial", "Helvetica", "sans-serif"]
          }
        }
      }
    };
  </script>
</head>
<body class="bg-[#F5F3F1] text-ink">
  <main class="min-h-screen px-0 py-0">
    <p class="mx-auto mb-1 max-w-[1200px] text-[18px] font-semibold text-[#CFCFCF]">Job Finding</p>

    <section class="mx-auto max-w-[1200px] overflow-hidden bg-white px-6 py-6 sm:px-8 sm:py-8 lg:px-[68px] lg:py-4">
      <header class="flex items-center justify-between gap-4 lg:pt-2">
        <div class="relative">
          <img src="./image/Chakri.png" alt="Chakri" class="relative z-10 h-8 w-auto sm:h-9">
          <img src="./image/Ellipse 973.svg" alt="" class="absolute -left-4 top-0 h-8 w-8">
          <img src="./image/Vector 123.svg" alt="" class="absolute -bottom-3 left-3 h-6 w-6">
        </div>

        <nav class="hidden items-center gap-10 text-sm font-semibold text-ink/90 lg:flex">
          <a href="#" class="transition hover:text-accent">Category</a>
          <a href="#" class="transition hover:text-accent">Job</a>
          <a href="#" class="transition hover:text-accent">How it works</a>
          <a href="#" class="transition hover:text-accent">Testimonial</a>
        </nav>

        <div class="hidden items-center gap-4 lg:flex">
          <a href="#" class="text-sm font-semibold text-ink transition hover:text-accent">Register</a>
          <a href="#" class="rounded-xl bg-accent px-6 py-3 text-sm font-semibold text-white transition hover:bg-[#f47b3e]">Sing In</a>
        </div>

        <button type="button" aria-label="Menu" class="grid h-10 w-10 place-items-center rounded-xl text-accent lg:hidden">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 7h.01M12 7h.01M18 7h.01M6 12h.01M12 12h.01M18 12h.01M6 17h.01M12 17h.01M18 17h.01" />
          </svg>
        </button>
      </header>

      <div class="mt-8 grid items-center gap-8 lg:mt-12 lg:grid-cols-[0.97fr_1.03fr] lg:gap-2">
        <div class="order-1 pt-2 lg:pt-20">
          <h1 class="max-w-[560px] text-[2.28rem] font-extrabold leading-[0.98] tracking-[-0.055em] text-ink sm:text-[3.45rem] lg:text-[3.8rem]">
            Find Every <span class="relative inline-block z-0">Job<span class="absolute bottom-[0.12em] left-0 -z-10 h-[0.34em] w-full bg-[#FDB089]"></span></span><br>
            in One Platform
          </h1>

          <form class="mt-8 rounded-[16px] bg-white p-2 shadow-[0_18px_40px_rgba(34,59,90,0.08)] sm:max-w-[530px] sm:p-2.5">
            <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
              <label class="flex-1 rounded-2xl px-4 py-3">
                <span class="sr-only">Job or position</span>
                <input type="text" placeholder="Job / Position" class="w-full border-none bg-transparent text-sm font-medium text-ink outline-none placeholder:text-muted">
              </label>
              <label class="flex-1 rounded-2xl px-4 py-3">
                <span class="sr-only">Location</span>
                <input type="text" placeholder="Location" class="w-full border-none bg-transparent text-sm font-medium text-ink outline-none placeholder:text-muted">
              </label>
              <button class="rounded-[10px] bg-mint px-8 py-3 text-sm font-bold text-white transition hover:bg-[#76be67] sm:min-w-[132px]">Search</button>
            </div>
          </form>

          <div class="mt-5 flex flex-wrap items-center gap-2 text-xs sm:text-sm">
            <span class="font-semibold text-accent">Recent Search :</span>
            <span class="rounded-md bg-[#F5F7FA] px-2.5 py-1 text-[#7E8795]">Design</span>
            <span class="rounded-md bg-[#F5F7FA] px-2.5 py-1 text-[#7E8795]">UI/UX</span>
            <span class="rounded-md bg-[#F5F7FA] px-2.5 py-1 text-[#7E8795]">Product</span>
            <span class="rounded-md bg-[#F5F7FA] px-2.5 py-1 text-[#7E8795]">Graphic</span>
          </div>
        </div>

        <div class="order-2 relative flex justify-center pb-1 pt-2 lg:justify-end lg:pb-0">
          <div class="relative w-full max-w-[560px]">
            <div class="absolute left-1/2 top-[18%] h-[200px] w-[200px] -translate-x-1/2 rounded-full bg-[#8FCD7E] sm:h-[300px] sm:w-[300px] lg:left-[54%] lg:top-[20%] lg:h-[330px] lg:w-[330px]"></div>
            <img src="./image/Vector 126.svg" alt="" class="absolute left-1/2 top-[8%] w-[250px] -translate-x-1/2 opacity-70 sm:w-[380px] lg:left-[56%] lg:top-[11%] lg:w-[440px]">

            <img src="./image/Image.png" alt="Happy professional" class="relative z-10 mx-auto w-[240px] max-w-full sm:w-[360px] lg:ml-auto lg:mr-[18px] lg:w-[490px]">

            <img src="./image/Group.svg" alt="" class="absolute bottom-[6%] left-[20%] z-0 w-[44px] sm:bottom-[12%] sm:left-[9%] sm:w-[76px] lg:bottom-[9%] lg:left-[16%] lg:w-[92px]">
            <img src="./image/Vector.svg" alt="Verified" class="absolute right-[12%] top-[23%] z-20 h-9 w-9 rounded-full bg-white p-2 shadow-soft sm:h-12 sm:w-12 lg:right-[7%] lg:top-[24%] lg:h-14 lg:w-14 lg:p-3">

            <div class="absolute bottom-[10%] right-[6%] z-20 w-[148px] rounded-2xl bg-white p-2.5 shadow-[0_18px_45px_rgba(34,59,90,0.12)] sm:w-[178px] sm:p-3 lg:bottom-[12%] lg:right-0 lg:w-[198px] lg:p-4">
              <p class="text-[9px] font-semibold text-[#9AA4B2] sm:text-[10px] lg:text-xs">20k+ People Find Job!</p>
              <div class="mt-2">
                <img src="./image/Cart.png" alt="People who found jobs" class="h-auto w-full rounded-full">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-7 pt-3 sm:mt-8 sm:pt-4 lg:hidden">
        <img src="./image/Logos.svg" alt="Company logos" class="mx-auto w-full max-w-[720px] opacity-80 lg:max-w-[790px]">
      </div>
    </section>
  </main>
</body>
</html>
